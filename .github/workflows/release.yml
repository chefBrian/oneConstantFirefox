name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build extension zips
        run: |
          # Use GNU sed (no -i '' needed on Linux)
          chmod +x build.sh
          bash build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.zip

      - name: Submit to Firefox AMO
        run: npx web-ext sign --channel=listed --source-dir=dist/firefox/
        env:
          WEB_EXT_API_KEY: ${{ secrets.FIREFOX_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit to Chrome Web Store
        run: npx chrome-webstore-upload-cli@3 upload --source dist/fantrax-baseball-plus-chrome-v*.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Resolve Edge zip path
        id: edge_zip
        run: echo "path=$(ls dist/fantrax-baseball-plus-chrome-v*.zip)" >> "$GITHUB_OUTPUT"

      - name: Submit to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: ${{ steps.edge_zip.outputs.path }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}
